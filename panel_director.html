<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Panel Director — Los Silos CF</title>
<style>
:root{
  --azul:#1A3A6B;--azul2:#2E5FAC;--azul-c:#DAEEFF;
  --verde:#1E7B34;--verde-c:#D4F0DC;
  --rojo:#C0392B;--rojo-c:#FAD7D3;
  --naranja:#E8771A;--naranja-c:#FFE5CC;
  --gris:#F0F4F8;--borde:#E0E0E0;
  --texto:#1A1A1A;--texto2:#666;--texto3:#999;
  --radio:14px;--radio-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--gris);color:var(--texto);min-height:100vh}
.topbar{background:var(--azul);color:#fff;padding:env(safe-area-inset-top,14px) 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn-back{width:36px;height:36px;border-radius:50%;border:none;background:#fff2;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700}.topbar p{font-size:11px;opacity:.7;margin-top:1px}
.topbar-right{margin-left:auto}
.btn-refresh{background:#fff2;border:none;color:#fff;font-size:20px;padding:6px 10px;border-radius:8px;cursor:pointer}
.body{padding:12px 16px 40px}
.sec-label{font-size:11px;font-weight:700;color:var(--texto3);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px 2px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--borde)}

/* RESUMEN */
.resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.res-card{background:#fff;border-radius:var(--radio-sm);border:.5px solid var(--borde);padding:12px;text-align:center}
.res-num{font-size:28px;font-weight:800;line-height:1}
.res-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin-top:4px;font-weight:600}
.res-card.verde .res-num{color:var(--verde)}.res-card.verde .res-lbl{color:var(--verde)}
.res-card.rojo .res-num{color:var(--rojo)}.res-card.rojo .res-lbl{color:var(--rojo)}
.res-card.gris .res-num{color:var(--texto3)}.res-card.gris .res-lbl{color:var(--texto3)}

/* SEMÁFORO POR EQUIPO */
.equipo-row{background:#fff;border-radius:var(--radio);border:.5px solid var(--borde);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s}
.equipo-row:active{background:var(--gris)}
.semaforo{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.sem-verde{background:var(--verde);box-shadow:0 0 6px rgba(30,123,52,.4)}
.sem-rojo{background:var(--rojo);box-shadow:0 0 6px rgba(192,57,43,.4)}
.sem-naranja{background:var(--naranja);box-shadow:0 0 6px rgba(232,119,26,.4)}
.sem-gris{background:#ccc}
.equipo-info{flex:1;min-width:0}
.equipo-nombre{font-size:14px;font-weight:600}
.equipo-detalle{font-size:11px;color:var(--texto3);margin-top:2px}
.equipo-estado{text-align:right;flex-shrink:0}
.estado-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.badge-verde{background:var(--verde-c);color:var(--verde)}
.badge-rojo{background:var(--rojo-c);color:var(--rojo)}
.badge-naranja{background:var(--naranja-c);color:var(--naranja)}
.badge-gris{background:var(--gris);color:var(--texto3)}
.equipo-jornada{font-size:10px;color:var(--texto3);margin-top:2px}

/* DETALLE EQUIPO (expandido) */
.detalle-panel{display:none;background:var(--gris);border-radius:0 0 var(--radio) var(--radio);margin-top:-8px;margin-bottom:8px;padding:12px 16px;border:.5px solid var(--borde);border-top:none}
.detalle-panel.open{display:block}
.detalle-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--borde);font-size:13px}
.detalle-row:last-child{border-bottom:none}
.btn-recordatorio{width:100%;margin-top:10px;padding:10px;background:var(--naranja);color:#fff;border:none;border-radius:var(--radio-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* JORNADA SELECTOR */
.jornada-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.jornada-sel label{font-size:12px;font-weight:600;color:var(--texto2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.jornada-sel input{flex:1;padding:10px 12px;border:.5px solid var(--borde);border-radius:var(--radio-sm);font-size:14px;font-family:var(--font);outline:none;background:#fff}
.btn-buscar{padding:10px 16px;background:var(--azul);color:#fff;border:none;border-radius:var(--radio-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}

/* LOADING */
.loading-wrap{text-align:center;padding:40px 20px;color:var(--texto3)}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--borde);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="volverAtras()">&#8249;</button>
  <div><h1>&#128204; Panel del director</h1><p id="top-fecha">Cargando...</p></div>
  <div class="topbar-right">
    <button class="btn-refresh" onclick="cargarPanel()" title="Actualizar">&#8635;</button>
  </div>
</div>

<div class="body">

  <!-- SELECTOR JORNADA -->
  <div class="jornada-sel">
    <label>Jornada</label>
    <input type="number" id="sel-jornada" min="1" max="40" placeholder="Auto">
    <button class="btn-buscar" onclick="cargarPanel()">Ver</button>
  </div>

  <!-- RESUMEN -->
  <div class="resumen-grid">
    <div class="res-card verde"><div class="res-num" id="cnt-subidas">—</div><div class="res-lbl">Subidas</div></div>
    <div class="res-card rojo"><div class="res-num" id="cnt-pendientes">—</div><div class="res-lbl">Pendientes</div></div>
    <div class="res-card gris"><div class="res-num" id="cnt-sin-partido">—</div><div class="res-lbl">Sin partido</div></div>
  </div>

  <!-- LISTA EQUIPOS -->
  <div class="sec-label">Estado por equipo</div>
  <div id="equipos-lista">
    <div class="loading-wrap"><div class="spin"></div><br>Cargando fichas...</div>
  </div>

</div>

<script>
var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzccJuHc7_dNEJluOJL4-2HGnPvHX-UvzHIMCNPBmfJi5Q-dwFnyAKT0aatXCay3Ygm/exec';
var cfg = {};
try { cfg = JSON.parse(localStorage.getItem('silos_sesion') || '{}'); } catch(e) {}

var EQUIPOS = [
  {cat:'amateur',        nombre:'Amateur',         formato:'F11'},
  {cat:'juvenil_a',      nombre:'Juvenil A',       formato:'F11'},
  {cat:'juvenil_b',      nombre:'Juvenil B',       formato:'F11'},
  {cat:'cadete_a',       nombre:'Cadete A',        formato:'F11'},
  {cat:'cadete_b',       nombre:'Cadete B',        formato:'F11'},
  {cat:'cadete_femenino',nombre:'Cadete Femenino', formato:'F11'},
  {cat:'infantil_a',     nombre:'Infantil A',      formato:'F11'},
  {cat:'infantil_b',     nombre:'Infantil B',      formato:'F11'},
  {cat:'infantil_femenino',nombre:'Infantil Femenino',formato:'F11'},
  {cat:'alevin_a',       nombre:'Alevín A',        formato:'F8'},
  {cat:'alevin_b',       nombre:'Alevín B',        formato:'F8'},
  {cat:'alevin_femenino',nombre:'Alevín Femenino', formato:'F8'},
  {cat:'benjamin_a',     nombre:'Benjamín A',      formato:'F8'},
  {cat:'benjamin_b',     nombre:'Benjamín B',      formato:'F8'},
  {cat:'prebenjamin_a',  nombre:'Prebenjamín A',   formato:'F8'},
  {cat:'prebenjamin_b',  nombre:'Prebenjamín B',   formato:'F8'}
];

function volverAtras() {
  if (window.history.length > 1) history.back();
  else window.location.href = 'index.html';
}

async function cargarPanel() {
  var jornada = document.getElementById('sel-jornada').value || '';
  document.getElementById('equipos-lista').innerHTML = '<div class="loading-wrap"><div class="spin"></div><br>Cargando fichas...</div>';
  document.getElementById('top-fecha').textContent = 'Actualizando...';

  try {
    var url = WEBAPP_URL + '?action=panel_director';
    if (jornada) url += '&jornada=' + jornada;
    var r = await fetch(url).then(function(res) { return res.json(); });

    if (!r.ok) {
      document.getElementById('equipos-lista').innerHTML = '<div class="loading-wrap">Error al cargar datos</div>';
      return;
    }

    var datos = r.equipos || {};
    var jornada_actual = r.jornada || '?';
    document.getElementById('top-fecha').textContent = 'Jornada ' + jornada_actual;
    document.getElementById('sel-jornada').placeholder = jornada_actual;

    var subidas = 0, pendientes = 0, sin_partido = 0;
    var html = '';

    EQUIPOS.forEach(function(eq) {
      var info = datos[eq.cat] || {estado: 'sin_partido'};
      var estado = info.estado;

      if (estado === 'subida') subidas++;
      else if (estado === 'pendiente') pendientes++;
      else sin_partido++;

      var sem_cls, badge_cls, badge_txt, detalle_txt, entrenador;
      if (estado === 'subida') {
        sem_cls   = 'sem-verde';
        badge_cls = 'badge-verde';
        badge_txt = '✅ Subida';
        detalle_txt = 'Ficha subida por ' + (info.entrenador || 'desconocido');
        entrenador = info.entrenador || '';
      } else if (estado === 'pendiente') {
        sem_cls   = 'sem-rojo';
        badge_cls = 'badge-rojo';
        badge_txt = '❌ Pendiente';
        detalle_txt = 'Sin ficha registrada';
        entrenador = info.entrenador || '';
      } else if (estado === 'sin_calendario') {
        sem_cls   = 'sem-naranja';
        badge_cls = 'badge-naranja';
        badge_txt = '⚠️ Sin calendario';
        detalle_txt = 'No hay partido registrado en el calendario';
        entrenador = '';
      } else {
        sem_cls   = 'sem-gris';
        badge_cls = 'badge-gris';
        badge_txt = '— Sin partido';
        detalle_txt = 'No tenía partido esta jornada';
        entrenador = '';
      }

      html += '<div>';
      html += '<div class="equipo-row" onclick="toggleDetalle(\'' + eq.cat + '\')">';
      html += '<div class="semaforo ' + sem_cls + '"></div>';
      html += '<div class="equipo-info">';
      html += '<div class="equipo-nombre">' + eq.nombre + '</div>';
      html += '<div class="equipo-detalle">' + eq.formato + (entrenador ? ' · ' + entrenador : '') + '</div>';
      html += '</div>';
      html += '<div class="equipo-estado">';
      html += '<div class="estado-badge ' + badge_cls + '">' + badge_txt + '</div>';
      if (info.fecha) html += '<div class="equipo-jornada">' + info.fecha + '</div>';
      html += '</div></div>';

      html += '<div class="detalle-panel" id="det_' + eq.cat + '">';
      html += '<div class="detalle-row"><span>' + detalle_txt + '</span></div>';
      if (estado === 'subida' && info.resultado) {
        html += '<div class="detalle-row"><span>Resultado</span><strong>' + info.resultado + '</strong></div>';
      }
      if (estado === 'subida' && info.rival) {
        html += '<div class="detalle-row"><span>Rival</span><span>' + info.rival + '</span></div>';
      }
      if (estado === 'pendiente' && entrenador) {
        html += '<button class="btn-recordatorio" onclick="enviarRecordatorio(\'' + eq.cat + '\',\'' + entrenador + '\')">📲 Enviar recordatorio a ' + entrenador + '</button>';
      }
      html += '</div>';
      html += '</div>';
    });

    document.getElementById('equipos-lista').innerHTML = html;
    document.getElementById('cnt-subidas').textContent    = subidas;
    document.getElementById('cnt-pendientes').textContent = pendientes;
    document.getElementById('cnt-sin-partido').textContent = sin_partido;

  } catch(e) {
    document.getElementById('equipos-lista').innerHTML = '<div class="loading-wrap">Error de conexión</div>';
  }
}

function toggleDetalle(cat) {
  var panel = document.getElementById('det_' + cat);
  if (!panel) return;
  panel.classList.toggle('open');
}

async function enviarRecordatorio(cat, entrenador) {
  if (!confirm('Enviar recordatorio a ' + entrenador + ' para subir la ficha?')) return;
  try {
    await fetch(WEBAPP_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({tipo: 'recordatorio_ficha', categoria: cat, entrenador: entrenador})
    });
    alert('Recordatorio enviado a ' + entrenador);
  } catch(e) {
    alert('Error al enviar recordatorio');
  }
}

window.addEventListener('DOMContentLoaded', function() {
  cargarPanel();
});
</script>
</body>
</html>

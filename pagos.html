<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pagos — Los Silos CF</title>
<style>
:root{
  --azul:#1A3A6B;--azul2:#2E5FAC;--azul-c:#DAEEFF;
  --verde:#1E7B34;--verde-c:#D4F0DC;
  --rojo:#C0392B;--rojo-c:#FAD7D3;
  --naranja:#E8771A;--naranja-c:#FFE5CC;
  --amarillo:#856D00;--amarillo-c:#FFF9C4;
  --gris:#F0F4F8;--borde:#E0E0E0;
  --texto:#1A1A1A;--texto2:#666;--texto3:#999;
  --radio:14px;--radio-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--gris);color:var(--texto);min-height:100vh}
.topbar{background:var(--azul);color:#fff;padding:env(safe-area-inset-top,14px) 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn-back{width:36px;height:36px;border-radius:50%;border:none;background:#fff2;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.topbar h1{font-size:16px;font-weight:700}.topbar p{font-size:11px;opacity:.7;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.btn-top{background:#fff2;border:none;color:#fff;font-size:13px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer}
.body{padding:12px 16px 40px}
.sec-label{font-size:11px;font-weight:700;color:var(--texto3);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px 2px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--borde)}

/* FILTROS */
.filtros{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px}
.filtro-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--borde);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font);color:var(--texto2)}
.filtro-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}

/* RESUMEN */
.resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.res-card{background:#fff;border-radius:var(--radio-sm);border:.5px solid var(--borde);padding:12px;text-align:center}
.res-num{font-size:26px;font-weight:800;line-height:1}
.res-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin-top:4px;font-weight:600}
.res-card.v .res-num{color:var(--verde)}.res-card.v .res-lbl{color:var(--verde)}
.res-card.r .res-num{color:var(--rojo)}.res-card.r .res-lbl{color:var(--rojo)}
.res-card.g .res-num{color:var(--texto3)}.res-card.g .res-lbl{color:var(--texto3)}

/* BUSCADOR */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:12px 14px 12px 40px;border:.5px solid var(--borde);border-radius:var(--radio-sm);font-size:15px;font-family:var(--font);outline:none;background:#fff}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--texto3);font-size:16px}

/* JUGADOR ROW */
.jugador-card{background:#fff;border-radius:var(--radio);border:.5px solid var(--borde);margin-bottom:8px;overflow:hidden;cursor:pointer}
.jugador-header{display:flex;align-items:center;gap:12px;padding:12px 14px}
.jugador-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.jugador-info{flex:1;min-width:0}
.jugador-nombre{font-size:14px;font-weight:600;margin-bottom:2px}
.jugador-cat{font-size:11px;color:var(--texto3)}
.jugador-right{text-align:right;flex-shrink:0}
.jugador-pendiente{font-size:13px;font-weight:700}
.jugador-total{font-size:11px;color:var(--texto3)}
.estado-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.paso-dot{width:28px;height:28px;border-radius:50%;background:var(--borde);color:var(--texto3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.paso-dot.active{background:var(--azul);color:#fff}
.tipo-btn{padding:10px 6px;border-radius:var(--radio-sm);border:1.5px solid var(--borde);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--texto2);text-align:center;transition:all .15s}
.tipo-btn.active{background:var(--azul);color:#fff;border-color:var(--azul)}
.mes-cuota{padding:12px 8px;border-radius:var(--radio-sm);border:1.5px solid var(--borde);text-align:center;cursor:pointer;background:#fff}
.mes-cuota.pagado{background:var(--verde-c);border-color:var(--verde)}
.mes-cuota.beca{background:#E8EAF6;border-color:#9FA8DA}
.mes-cuota.hermano{background:var(--naranja-c);border-color:var(--naranja)}
.mes-cuota.pendiente{background:#fff}
.dot-verde{background:var(--verde)}.dot-rojo{background:var(--rojo)}
.dot-azul{background:var(--azul2)}.dot-amarillo{background:#F39C12}
.dot-gris{background:#ccc}.dot-beca{background:#3949AB}

/* DETALLE EXPANDIDO */
.jugador-detalle{display:none;border-top:.5px solid var(--borde);padding:12px 14px;background:var(--gris)}
.jugador-detalle.open{display:block}
.meses-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.mes-item{background:#fff;border-radius:8px;border:.5px solid var(--borde);padding:8px 4px;text-align:center;cursor:pointer}
.mes-item.pagado{background:var(--verde-c);border-color:var(--verde)}
.mes-item.sin-pagar{background:var(--rojo-c);border-color:var(--rojo)}
.mes-lbl{font-size:10px;font-weight:700;color:var(--texto2);text-transform:uppercase}
.mes-val{font-size:12px;font-weight:700;margin-top:3px;color:var(--texto)}
.mes-item.pagado .mes-lbl{color:var(--verde)}.mes-item.pagado .mes-val{color:var(--verde)}
.mes-item.sin-pagar .mes-lbl{color:var(--rojo)}.mes-item.sin-pagar .mes-val{color:var(--rojo)}
.btn-pago{width:100%;padding:12px;border:none;border-radius:var(--radio-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--azul);color:#fff}

/* MODAL PAGO */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:480px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;font-weight:600;color:var(--texto2);margin-bottom:5px;text-transform:uppercase}
.modal-field select,.modal-field input{width:100%;padding:12px 14px;border:.5px solid var(--borde);border-radius:var(--radio-sm);font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none;background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:14px;border-radius:var(--radio-sm);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
.modal-cancel{background:var(--gris);color:var(--texto2)}
.modal-ok{background:var(--verde);color:#fff}
.tipo-btn{padding:10px 8px;border-radius:var(--radio-sm);border:1.5px solid var(--borde);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--texto2);text-align:center}
.tipo-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.mes-estado-btn{padding:5px 4px;border-radius:6px;border:.5px solid var(--borde);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--texto2)}
.mes-estado-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}
.mes-estado-btn{padding:6px 4px;border-radius:6px;border:1px solid var(--borde);background:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--texto2);text-align:center;width:100%}
.mes-estado-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}

/* LOADING */
.loading-wrap{text-align:center;padding:40px 20px;color:var(--texto3)}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--borde);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="volverAtras()">&#8249;</button>
  <div><h1>&#128176; Pagos</h1><p id="top-sub">Temporada 2025/26</p></div>
  <div class="topbar-right">
    <button class="btn-top" onclick="cargarPagos()">&#8635;</button>
  </div>
</div>

<div class="body">

  <!-- RESUMEN -->
  <div class="resumen-grid">
    <div class="res-card v"><div class="res-num" id="cnt-al-dia">—</div><div class="res-lbl">Al día</div></div>
    <div class="res-card r"><div class="res-num" id="cnt-pendientes">—</div><div class="res-lbl">Pendiente</div></div>
    <div class="res-card g"><div class="res-num" id="cnt-total">—</div><div class="res-lbl">Total</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="res-card" style="background:#fff"><div class="res-num" id="cnt-recaudado" style="font-size:16px;color:var(--verde)">—</div><div class="res-lbl" style="color:var(--verde)">Recaudado</div></div>
    <div class="res-card" style="background:#fff"><div class="res-num" id="cnt-esperado" style="font-size:16px;color:var(--azul)">—</div><div class="res-lbl" style="color:var(--azul)">Esperado</div></div>
    <div class="res-card" style="background:#fff"><div class="res-num" id="cnt-porCobrar" style="font-size:16px;color:var(--rojo)">—</div><div class="res-lbl" style="color:var(--rojo)">Por cobrar</div></div>
  </div>

  <!-- FILTRO CATEGORÍA -->
  <div class="filtros" id="filtros-cat">
    <button class="filtro-btn on" onclick="filtrarCat('',this)">Todos</button>
    <button class="filtro-btn" onclick="filtrarCat('amateur',this)">Amateur</button>
    <button class="filtro-btn" onclick="filtrarCat('juvenil',this)">Juvenil</button>
    <button class="filtro-btn" onclick="filtrarCat('cadete',this)">Cadete</button>
    <button class="filtro-btn" onclick="filtrarCat('infantil',this)">Infantil</button>
    <button class="filtro-btn" onclick="filtrarCat('alevin',this)">Alevín</button>
    <button class="filtro-btn" onclick="filtrarCat('benjamin',this)">Benjamín</button>
    <button class="filtro-btn" onclick="filtrarCat('prebenjamin',this)">Prebenjamín</button>
    <button class="filtro-btn" onclick="filtrarCat('querubin',this)">Querubín</button>
  </div>

  <!-- FILTRO ESTADO -->
  <div class="filtros">
    <button class="filtro-btn on" id="fest-todos" onclick="filtrarEstado('',this)">Todos</button>
    <button class="filtro-btn" onclick="filtrarEstado('AL DÍA',this)">🟢 Al día</button>
    <button class="filtro-btn" onclick="filtrarEstado('PENDIENTE',this)">🔴 Pendiente</button>
    <button class="filtro-btn" onclick="filtrarEstado('EN PLAZO',this)">🔵 En plazo</button>
    <button class="filtro-btn" onclick="filtrarEstado('TEMPORADA',this)">🟡 Temporada</button>
    <button class="filtro-btn" onclick="filtrarEstado('BECA',this)">🟣 Beca</button>
  </div>

  <!-- BUSCADOR -->
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="buscador" placeholder="Buscar jugador..." oninput="renderLista()">
  </div>

  <!-- LISTA -->
  <div id="pagos-lista">
    <div class="loading-wrap"><div class="spin"></div><br>Cargando pagos...</div>
  </div>

</div>

<!-- BOTÓN AÑADIR -->
<div style="position:fixed;bottom:20px;right:20px;z-index:50">
  <button onclick="abrirModalAnyadir()" style="width:56px;height:56px;border-radius:50%;background:var(--azul);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center">+</button>
</div>

<!-- MODAL AÑADIR JUGADOR — 3 PASOS -->
<div class="modal-overlay hidden" id="modal-anyadir" onclick="if(event.target===this)cerrarAnyadir()">
  <div class="modal-sheet" style="max-height:90vh;overflow-y:auto">

    <!-- Indicador de pasos -->
    <div style="display:flex;gap:6px;margin-bottom:16px;justify-content:center">
      <div class="paso-dot" id="dot-1" style="width:28px;height:28px;border-radius:50%;background:var(--azul);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">1</div>
      <div style="flex:1;height:2px;background:var(--borde);margin:auto"></div>
      <div class="paso-dot" id="dot-2" style="width:28px;height:28px;border-radius:50%;background:var(--borde);color:var(--texto3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">2</div>
      <div style="flex:1;height:2px;background:var(--borde);margin:auto"></div>
      <div class="paso-dot" id="dot-3" style="width:28px;height:28px;border-radius:50%;background:var(--borde);color:var(--texto3);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">3</div>
    </div>

    <!-- PASO 1: Datos personales -->
    <div id="paso-1">
      <div class="modal-title">👤 Datos del jugador</div>
      <div class="modal-field"><label>Categoría</label>
        <select id="an-cat">
          <option value="amateur">Amateur</option>
          <option value="juvenil">Juvenil</option>
          <option value="cadete">Cadete</option>
          <option value="infantil">Infantil</option>
          <option value="alevin">Alevín</option>
          <option value="benjamin">Benjamín</option>
          <option value="prebenjamin">Prebenjamín</option>
          <option value="querubin">Querubín</option>
        </select>
      </div>
      <div class="modal-field"><label>Apellidos y Nombre</label><input type="text" id="an-nombre" placeholder="García López, Juan" autocapitalize="words"></div>
      <div class="modal-field"><label>Fecha de nacimiento</label><input type="date" id="an-fnac"></div>
      <div class="modal-field"><label>DNI</label><input type="text" id="an-dni" placeholder="12345678A"></div>
      <div class="modal-field"><label>Teléfono 1</label><input type="tel" id="an-tel1" placeholder="600000000"></div>
      <div class="modal-field"><label>Teléfono 2</label><input type="tel" id="an-tel2" placeholder="600000001"></div>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" onclick="cerrarAnyadir()">Cancelar</button>
        <button class="modal-btn modal-ok" onclick="paso1Siguiente()">Siguiente →</button>
      </div>
    </div>

    <!-- PASO 2: Tipo de pago e inscripción -->
    <div id="paso-2" style="display:none">
      <div class="modal-title">💳 Tipo de pago</div>
      <div class="modal-field">
        <label>Tipo de jugador</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <button class="tipo-btn on" id="tipo-normal" onclick="selTipo('normal')">👤 Normal</button>
          <button class="tipo-btn" id="tipo-beca" onclick="selTipo('beca')">🟣 Becado</button>
          <button class="tipo-btn" id="tipo-hermano" onclick="selTipo('hermano')">👨‍👩‍👦 Hermano</button>
          <button class="tipo-btn" id="tipo-baja" onclick="selTipo('baja')">⬛ Baja</button>
        </div>
      </div>
      <div class="modal-field" id="campo-inscr">
        <label>Inscripción</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
          <button class="tipo-btn on" id="inscr-si" onclick="selInscr('pagada')">✅ Pagada</button>
          <button class="tipo-btn" id="inscr-no" onclick="selInscr('pendiente')">⏳ Pendiente</button>
          <button class="tipo-btn" id="inscr-beca" onclick="selInscr('beca')">🟣 Beca</button>
          <button class="tipo-btn" id="inscr-banco" onclick="selInscr('banco')">🏦 Banco</button>
        </div>
      </div>
      <div class="modal-field" id="campo-importe-inscr" style="display:none">
        <label>Importe inscripción (€)</label>
        <input type="number" id="an-importe-inscr" placeholder="100">
      </div>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" onclick="irPaso(1)">← Atrás</button>
        <button class="modal-btn modal-ok" onclick="paso2Siguiente()">Siguiente →</button>
      </div>
    </div>

    <!-- PASO 3: Estado de cada mes -->
    <div id="paso-3" style="display:none">
      <div class="modal-title">📅 Cuotas mensuales</div>
      <p style="font-size:12px;color:var(--texto3);margin-bottom:12px">Marca el estado de cada mes</p>
      <div id="meses-grid-anyadir"></div>
      <div class="modal-field" style="margin-top:12px">
        <label>Notas</label>
        <textarea id="an-notas" rows="2" placeholder="Observaciones..." style="width:100%;padding:10px;border:.5px solid var(--borde);border-radius:var(--radio-sm);font-family:var(--font);font-size:14px;resize:none;outline:none"></textarea>
      </div>
      <div class="modal-btns">
        <button class="modal-btn modal-cancel" onclick="irPaso(2)">← Atrás</button>
        <button class="modal-btn modal-ok" onclick="confirmarAnyadir()">✅ Guardar jugador</button>
      </div>
    </div>

  </div>
</div>

<!-- MODAL REGISTRAR PAGO -->
<div class="modal-overlay hidden" id="modal-pago" onclick="cerrarModal(event)">
  <div class="modal-sheet">
    <div class="modal-title">Registrar pago</div>
    <div id="modal-jugador-nombre" style="text-align:center;font-size:13px;color:var(--texto2);margin-bottom:12px"></div>
    <div class="modal-field">
      <label>Mes</label>
      <select id="modal-mes">
        <option value="INSCR.">Inscripción</option>
        <option value="SEPT.">Septiembre</option>
        <option value="OCT.">Octubre</option>
        <option value="NOV.">Noviembre</option>
        <option value="DIC.">Diciembre</option>
        <option value="ENE.">Enero</option>
        <option value="FEB.">Febrero</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Importe (€)</label>
      <input type="number" id="modal-importe" placeholder="70" min="0">
    </div>
    <div class="modal-field">
      <label>Tipo de pago</label>
      <select id="modal-tipo">
        <option value="">Efectivo</option>
        <option value="BANCO">Transferencia</option>
        <option value="DOM">Domiciliación</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="document.getElementById('modal-pago').classList.add('hidden')">Cancelar</button>
      <button class="modal-btn modal-ok" onclick="confirmarPago()">✅ Confirmar</button>
    </div>
  </div>
</div>

<script>
var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzccJuHc7_dNEJluOJL4-2HGnPvHX-UvzHIMCNPBmfJi5Q-dwFnyAKT0aatXCay3Ygm/exec';
var cfg = {};
try { cfg = JSON.parse(localStorage.getItem('silos_sesion') || '{}'); } catch(e) {}

var COLORES_CAT = {
  'amateur':'#1A3A6B',
  'juvenil':'#2E5FAC',
  'cadete':'#1E7B34',
  'infantil':'#E8771A',
  'alevin':'#8E44AD',
  'benjamin':'#16A085',
  'prebenjamin':'#2C3E50',
  'querubin':'#C0392B'
};

var todosJugadores = [];
var catFiltro = '';
var estadoFiltro = '';
var jugadorModal = null;

function volverAtras() {
  if (window.history.length > 1) history.back();
  else window.location.href = 'index.html';
}

var configPagos = {};

async function cargarConfigPagos() {
  try {
    var r = await fetch(WEBAPP_URL + '?action=config_pagos').then(function(res){ return res.json(); });
    if (r.ok && r.config) configPagos = r.config;
  } catch(e) {}
}

function getMesesCat(cat) {
  if (configPagos[cat] && configPagos[cat].meses) return configPagos[cat].meses;
  var defaults = {amateur:3,juvenil:4,cadete:6,infantil:6,alevin:6,benjamin:6,prebenjamin:6,querubin:6};
  return defaults[cat] || 6;
}

async function cargarPagos() {
  document.getElementById('pagos-lista').innerHTML = '<div class="loading-wrap"><div class="spin"></div><br>Cargando pagos...</div>';
  try {
    var r = await fetch(WEBAPP_URL + '?action=pagos').then(function(res){ return res.json(); });
    if (!r.ok) { document.getElementById('pagos-lista').innerHTML = '<div class="loading-wrap">Error: ' + (r.error||'desconocido') + '</div>'; return; }
    todosJugadores = r.jugadores || [];
    actualizarResumen();
    renderLista();
  } catch(e) {
    document.getElementById('pagos-lista').innerHTML = '<div class="loading-wrap">Error de conexión</div>';
  }
}

function getEstadoInfo(estado) {
  var e = (estado || '').toUpperCase();
  if (e.indexOf('AL') !== -1 || e === 'AL DÍA') return {cls:'dot-verde',    txt:'AL DÍA',    color:'#D4F0DC', borde:'#A8D5B5', texto:'#1E7B34'};
  if (e.indexOf('TEMPORADA') !== -1)             return {cls:'dot-amarillo', txt:'TEMPORADA', color:'#FFF9C4', borde:'#F5E27A', texto:'#856D00'};
  if (e.indexOf('EN PLAZO') !== -1)              return {cls:'dot-azul',     txt:'EN PLAZO',  color:'#DAEEFF', borde:'#B5D4F4', texto:'#1A3A6B'};
  if (e === 'BECA')                              return {cls:'dot-beca',     txt:'BECA',      color:'#E8EAF6', borde:'#9FA8DA', texto:'#3949AB'};
  if (e.indexOf('BAJA') !== -1)                  return {cls:'dot-gris',     txt:'BAJA',      color:'#EEE',    borde:'#DDD',    texto:'#999'};
  if (e.indexOf('PENDIENTE') !== -1)             return {cls:'dot-rojo',     txt:'PENDIENTE', color:'#FAD7D3', borde:'#F1B0B4', texto:'#C0392B'};
  return {cls:'dot-gris', txt:estado||'—', color:'#F5F5F5', borde:'#DDD', texto:'#666'};
}

function actualizarResumen() {
  var al_dia=0, pendiente=0, total=0, recaudado=0, esperado=0;
  todosJugadores.forEach(function(j) {
    var info = getEstadoInfo(j.estado);
    if (info.txt === 'BAJA') return;
    total++;
    if (info.txt === 'AL DÍA' || info.txt === 'TEMPORADA' || info.txt === 'EN PLAZO') al_dia++;
    else if (info.txt === 'PENDIENTE') pendiente++;
    var pag = parseFloat(j.total) || 0;
    var pend = parseFloat(j.pendiente) || 0;
    recaudado += pag;
    esperado  += pag + pend;
  });
  document.getElementById('cnt-al-dia').textContent = al_dia;
  document.getElementById('cnt-pendientes').textContent = pendiente;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('cnt-recaudado').textContent = recaudado.toFixed(0)+'€';
  document.getElementById('cnt-esperado').textContent = esperado.toFixed(0)+'€';
  document.getElementById('cnt-porCobrar').textContent = (esperado-recaudado).toFixed(0)+'€';
}

function filtrarCat(cat, btn) {
  catFiltro = cat;
  document.querySelectorAll('#filtros-cat .filtro-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderLista();
}

function filtrarEstado(estado, btn) {
  estadoFiltro = estado;
  document.querySelectorAll('.filtros:last-of-type .filtro-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderLista();
}

function renderLista() {
  var busq = (document.getElementById('buscador').value || '').toLowerCase();
  var lista = todosJugadores.filter(function(j) {
    if (catFiltro && j.categoria !== catFiltro) return false;
    var info = getEstadoInfo(j.estado);
    if (estadoFiltro && info.txt !== estadoFiltro) return false;
    if (busq && j.nombre.toLowerCase().indexOf(busq) === -1) return false;
    return true;
  });

  if (!lista.length) {
    document.getElementById('pagos-lista').innerHTML = '<div class="loading-wrap">Sin resultados</div>';
    return;
  }

  var html = '';
  lista.forEach(function(j, idx) {
    var info = getEstadoInfo(j.estado);
    var nom_parts = j.nombre.split(',');
    var ini = nom_parts.map(function(p){ return (p.trim()[0]||''); }).join('').substring(0,2).toUpperCase();
    var color_cat = COLORES_CAT[j.categoria] || '#1A3A6B';
    var pendiente_txt = j.pendiente ? j.pendiente + '€' : '—';
    var total_txt = j.total ? j.total + '€' : '0€';

    html += '<div class="jugador-card" style="border-left:3px solid ' + info.texto + '">';
    html += '<div class="jugador-header" onclick="toggleDetalle(\'det_' + idx + '\')">';
    html += '<div class="jugador-avatar" style="background:' + color_cat + '">' + ini + '</div>';
    html += '<div class="jugador-info">';
    html += '<div class="jugador-nombre">' + j.nombre + '</div>';
    html += '<div class="jugador-cat">' + j.categoria.replace(/_/g,' ') + '</div>';
    html += '</div>';
    html += '<div class="jugador-right">';
    html += '<div class="jugador-pendiente" style="color:' + info.texto + '">' + pendiente_txt + '</div>';
    html += '<div class="jugador-total">Pagado: ' + total_txt + '</div>';
    html += '</div>';
    html += '<div class="estado-dot ' + info.cls + '" style="margin-left:8px"></div>';
    html += '</div>';

    // Detalle meses
    html += '<div class="jugador-detalle" id="det_' + idx + '">';
    html += '<div class="meses-grid">';
    var MESES = ['INSCR.','SEPT.','OCT.','NOV.','DIC.','ENE.','FEB.'];
    MESES.forEach(function(mes) {
      var val = j.meses && j.meses[mes] !== undefined ? j.meses[mes].toString() : '';
      var pagado = val !== '' && val !== '0' && val.toLowerCase() !== 'nan';
      var cls = pagado ? 'pagado' : 'sin-pagar';
      var lbl = mes === 'INSCR.' ? 'INSC' : mes.replace('.','');
      html += '<div class="mes-item ' + cls + '" onclick="abrirPago(\'' + idx + '\',\'' + mes + '\')">';
      html += '<div class="mes-lbl">' + lbl + '</div>';
      html += '<div class="mes-val">' + (pagado ? (val || '✓') : '—') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<button class="btn-pago" onclick="abrirPago(\'' + idx + '\',null)">💳 Registrar pago</button>';
    html += '</div>';
    html += '</div>';
  });

  document.getElementById('pagos-lista').innerHTML = html;
  document.getElementById('pagos-lista')._lista = lista;
}

function toggleDetalle(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function abrirPago(idx, mes) {
  var lista = document.getElementById('pagos-lista')._lista;
  jugadorModal = lista[idx];
  document.getElementById('modal-jugador-nombre').textContent = jugadorModal.nombre;
  if (mes) document.getElementById('modal-mes').value = mes;
  document.getElementById('modal-pago').classList.remove('hidden');
}

function cerrarModal(e) {
  if (e.target === document.getElementById('modal-pago')) {
    document.getElementById('modal-pago').classList.add('hidden');
  }
}

async function confirmarPago() {
  if (!jugadorModal) return;
  var mes     = document.getElementById('modal-mes').value;
  var importe = document.getElementById('modal-importe').value;
  var tipo    = document.getElementById('modal-tipo').value;
  var valor   = tipo ? tipo : (importe || '');
  if (!valor) { alert('Introduce el importe'); return; }

  document.getElementById('modal-pago').classList.add('hidden');
  try {
    await fetch(WEBAPP_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        tipo: 'registrar_pago',
        nombre: jugadorModal.nombre,
        categoria: jugadorModal.categoria,
        mes: mes,
        importe: valor
      })
    });
    // Actualizar local
    if (jugadorModal.meses) jugadorModal.meses[mes] = valor;
    renderLista();
    setTimeout(cargarPagos, 2000); // recargar para tener estado actualizado
  } catch(e) {
    alert('Error al registrar pago');
  }
}

// ── MODAL AÑADIR JUGADOR ─────────────────────────────────────────
var _anTipo = 'normal';
var _anInscr = 'pagada';
var MESES_LABELS_AN = ['INSCR.','SEPT.','OCT.','NOV.','DIC.','ENE.','FEB.'];
var MESES_NOMBRES_AN = ['Inscripción','Septiembre','Octubre','Noviembre','Diciembre','Enero','Febrero'];
var _anMesesEstado = {}; // mes -> {estado, importe}

async function abrirModalAnyadir() {
  await cargarConfigPagos(); // siempre recargar — puede haber cambiado en CONFIG
  _anTipo = 'normal'; _anInscr = 'pagada'; _anMesesEstado = {};
  var sel = document.getElementById('an-cat');
  if (catFiltro && sel) sel.value = catFiltro;
  ['tipo-normal','tipo-beca','tipo-hermano','tipo-baja'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.classList.remove('on');
  });
  var tn = document.getElementById('tipo-normal'); if(tn) tn.classList.add('on');
  var ci = document.getElementById('campo-inscr'); if(ci) ci.style.display = '';
  irPaso(1);
  document.getElementById('modal-anyadir').classList.remove('hidden');
}

function cerrarAnyadir() {
  document.getElementById('modal-anyadir').classList.add('hidden');
}

function irPaso(n) {
  [1,2,3].forEach(function(i) {
    document.getElementById('paso-'+i).style.display = i===n ? '' : 'none';
    var dot = document.getElementById('dot-'+i);
    dot.style.background = i <= n ? 'var(--azul)' : 'var(--borde)';
    dot.style.color = i <= n ? '#fff' : 'var(--texto3)';
  });
}

function paso1Siguiente() {
  var nombre = document.getElementById('an-nombre').value.trim();
  if (!nombre) { alert('El nombre es obligatorio'); return; }
  irPaso(2);
}

function paso2Siguiente() {
  renderMesesAnyadir();
  irPaso(3);
}

function selTipo(tipo) {
  _anTipo = tipo;
  ['normal','beca','hermano','baja'].forEach(function(t){
    document.getElementById('tipo-'+t).classList.toggle('on', t===tipo);
  });
  // Si beca completa, ocultar inscripción
  var campoInscr = document.getElementById('campo-inscr');
  if (tipo === 'beca') {
    campoInscr.style.display = 'none';
    _anInscr = 'beca';
  } else if (tipo === 'baja') {
    campoInscr.style.display = 'none';
    _anInscr = 'baja';
  } else {
    campoInscr.style.display = '';
  }
}

function selInscr(val) {
  _anInscr = val;
  ['si','no','beca','banco'].forEach(function(t){
    document.getElementById('inscr-'+t).classList.remove('on');
  });
  var map = {pagada:'si', pendiente:'no', beca:'beca', banco:'banco'};
  if (map[val]) document.getElementById('inscr-'+map[val]).classList.add('on');
  document.getElementById('campo-importe-inscr').style.display = (val==='pagada'||val==='banco') ? '' : 'none';
}

function renderMesesAnyadir() {
  var cat = document.getElementById('an-cat').value;
  // Meses según categoría (refleja CONFIG)
  var mesesCount = getMesesCat(cat);
  var TODOS_MESES = [
    {key:'SEPT.', nom:'Septiembre'},
    {key:'OCT.',  nom:'Octubre'},
    {key:'NOV.',  nom:'Noviembre'},
    {key:'DIC.',  nom:'Diciembre'},
    {key:'ENE.',  nom:'Enero'},
    {key:'FEB.',  nom:'Febrero'}
  ];
  var html = '';
  // Inscripción
  var ins_est = _anTipo === 'beca' ? 'Beca' : (_anInscr === 'pagada' ? 'Pagado' : 'Pendiente');
  html += renderMesItem('INSCR.', 'Inscripción', ins_est, 0);
  // Meses activos según categoría
  for (var i = 0; i < mesesCount; i++) {
    var m = TODOS_MESES[i];
    var est = _anTipo === 'beca' ? 'Beca' : (_anMesesEstado[m.key] ? _anMesesEstado[m.key].estado : 'Pendiente');
    html += renderMesItem(m.key, m.nom, est, i+1);
  }
  document.getElementById('meses-grid-anyadir').innerHTML = html;
}

function renderMesItem(key, nombre, estadoActual, idx) {
  var ESTADOS = ['Pendiente','Pagado','Beca','Baja'];
  var COLORES = {Pendiente:'#fff',Pagado:'#D4F0DC',Beca:'#E8EAF6',Baja:'#EEE'};
  var bg = COLORES[estadoActual] || '#fff';
  var isPagado = estadoActual === 'Pagado';
  var html = '<div style="background:'+bg+';border-radius:var(--radio-sm);padding:10px;margin-bottom:8px;border:.5px solid var(--borde)">';
  html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px">'+nombre+'</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px">';
  ESTADOS.forEach(function(est) {
    var on = est === estadoActual;
    html += '<button data-key="'+key+'" data-est="'+est+'" onclick="selMesEstadoBtn(this)" class="mes-estado-btn'+(on?' on':'')+'">'+est+'</button>';
  });
  html += '</div>';
  // Si pagado: selector forma de pago + importe
  html += '<div id="pago-detail-'+key.replace('.','_')+'" style="display:'+(isPagado?'flex':'none')+';gap:6px;align-items:center">';
  html += '<select id="forma-'+key.replace('.','_')+'" style="flex:1;padding:7px 8px;border:.5px solid var(--borde);border-radius:6px;font-size:13px;font-family:var(--font);background:#fff;outline:none"><option value="METALICO">💵 Metálico</option><option value="BANCO">🏦 Banco</option><option value="TARJETA">💳 Tarjeta</option></select>';
  html += '<input type="number" placeholder="€" min="0" id="importe-'+key.replace('.','_')+'" style="width:72px;padding:7px 8px;border:.5px solid var(--borde);border-radius:6px;font-size:14px;text-align:right;outline:none">';
  html += '</div>';
  html += '</div>';
  return html;
}

function selMesEstadoBtn(btn) {
  var key   = btn.getAttribute('data-key');
  var estado = btn.getAttribute('data-est');
  selMesEstado(key, estado, btn);
}

function selMesEstado(key, estado, btn) {
  _anMesesEstado[key] = {estado: estado};
  var container = btn.parentElement.parentElement;
  container.querySelectorAll('.mes-estado-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  var COLORES = {Pendiente:'#fff', Pagado:'#D4F0DC', Beca:'#E8EAF6', Baja:'#EEE'};
  container.style.background = COLORES[estado] || '#fff';
  // Mostrar/ocultar selector de pago
  var detId = 'pago-detail-' + key.replace('.','_');
  var det = document.getElementById(detId);
  if (det) det.style.display = estado === 'Pagado' ? 'flex' : 'none';
}

async function confirmarAnyadir() {
  var nombre = document.getElementById('an-nombre').value.trim();
  var cat    = document.getElementById('an-cat').value;
  var dni    = document.getElementById('an-dni').value.trim();
  var tel1   = document.getElementById('an-tel1').value.trim();
  var tel2   = document.getElementById('an-tel2').value.trim();
  var fnac   = document.getElementById('an-fnac').value;
  var notas  = document.getElementById('an-notas').value.trim();

  if (!nombre) { alert('El nombre es obligatorio'); return; }

  // Recoger estado de cada mes
  var meses_data = {};
  var TODOS_KEYS = ['INSCR.','SEPT.','OCT.','NOV.','DIC.','ENE.','FEB.'];
  TODOS_KEYS.forEach(function(m) {
    var keyId = m.replace('.','_');
    var estado = _anMesesEstado[m] ? _anMesesEstado[m].estado : '';
    var valor = '';
    if (estado === 'Pagado') {
      var forma = document.getElementById('forma-'+keyId);
      var importe = document.getElementById('importe-'+keyId);
      valor = (importe && importe.value) ? importe.value : (forma ? forma.value : 'METALICO');
    } else if (estado === 'Beca') {
      valor = 'BECA';
    } else if (estado === 'Baja') {
      valor = 'BAJA';
    }
    meses_data[m] = valor;
  });

  cerrarAnyadir();

  try {
    await fetch(WEBAPP_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tipo:'anyadir_jugador_pagos',
        categoria: cat, nombre: nombre, dni: dni,
        telefono: tel1, telefono2: tel2, fnac: fnac,
        tipo_pago: _anTipo, inscripcion: _anInscr,
        meses: meses_data, notas: notas
      })
    });
    alert('✅ Jugador añadido correctamente');
    setTimeout(cargarPagos, 2000);
  } catch(e) { alert('Error al añadir jugador'); }
}

window.addEventListener('DOMContentLoaded', function() {
  cargarConfigPagos();
  cargarPagos();
});

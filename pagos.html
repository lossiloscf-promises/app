<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Pagos — Los Silos CF</title>
<style>
:root{
  --azul:#1A3A6B;--azul2:#2E5FAC;--azul-c:#DAEEFF;
  --verde:#1E7B34;--verde-c:#D4F0DC;
  --rojo:#C0392B;--rojo-c:#FAD7D3;
  --naranja:#E8771A;--naranja-c:#FFE5CC;
  --amarillo:#856D00;--amarillo-c:#FFF9C4;
  --gris:#F0F4F8;--borde:#E0E0E0;
  --texto:#1A1A1A;--texto2:#666;--texto3:#999;
  --radio:14px;--radio-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--gris);color:var(--texto);min-height:100vh}
.topbar{background:var(--azul);color:#fff;padding:env(safe-area-inset-top,14px) 16px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn-back{width:36px;height:36px;border-radius:50%;border:none;background:#fff2;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}
.topbar h1{font-size:16px;font-weight:700}
.topbar p{font-size:11px;opacity:.7;margin-top:1px}
.body{padding:12px 16px 80px}
.sec-label{font-size:11px;font-weight:700;color:var(--texto3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px 2px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:.5px;background:var(--borde)}

/* FILTROS CATEGORIA */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:7px 14px;border-radius:20px;border:.5px solid var(--borde);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--texto2);white-space:nowrap;font-family:var(--font);flex-shrink:0}
.cat-tab.on{background:var(--azul);color:#fff;border-color:var(--azul)}

/* RESUMEN */
.resumen-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.resumen-box{background:#fff;border-radius:var(--radio-sm);border:.5px solid var(--borde);padding:10px;text-align:center}
.resumen-val{font-size:24px;font-weight:800}
.resumen-val.verde{color:var(--verde)}
.resumen-val.rojo{color:var(--rojo)}
.resumen-val.naranja{color:var(--naranja)}
.resumen-lbl{font-size:10px;color:var(--texto3);margin-top:2px;text-transform:uppercase}

/* FILTROS ESTADO */
.filtros{display:flex;gap:6px;margin-bottom:12px}
.filtro-btn{padding:6px 14px;border-radius:20px;border:.5px solid var(--borde);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--texto2);font-family:var(--font)}
.filtro-btn.on{background:var(--azul);color:#fff;border-color:var(--azul)}

/* JUGADOR CARD */
.jugador-card{background:#fff;border-radius:var(--radio-sm);border:.5px solid var(--borde);padding:12px 14px;margin-bottom:8px;border-left:3px solid}
.jugador-card.al-dia{border-left-color:var(--verde)}
.jugador-card.pendiente{border-left-color:var(--rojo)}
.jugador-card.parcial{border-left-color:var(--naranja)}
.jugador-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.jugador-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av-verde{background:var(--verde)}
.av-rojo{background:var(--rojo)}
.av-naranja{background:var(--naranja)}
.jugador-nombre{flex:1;font-size:14px;font-weight:600;line-height:1.2}
.jugador-equipo{font-size:11px;color:var(--texto3)}
.badge-estado{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0}
.badge-al-dia{background:var(--verde-c);color:var(--verde)}
.badge-pendiente{background:var(--rojo-c);color:var(--rojo)}
.badge-parcial{background:var(--naranja-c);color:var(--naranja)}
.meses-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.mes-chip{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.mes-pagado{background:var(--verde-c);color:var(--verde)}
.mes-pendiente{background:var(--rojo-c);color:var(--rojo)}
.mes-especial{background:var(--azul-c);color:var(--azul2)}
.jugador-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:.5px solid var(--borde)}
.jugador-tel{font-size:12px;color:var(--texto3)}
.btn-wa{padding:6px 14px;border-radius:20px;border:none;background:#25D366;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-wa:active{opacity:.8}

.empty{text-align:center;color:var(--texto3);padding:30px;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #eee;border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="history.back()">&#8249;</button>
  <div>
    <h1>💰 Pagos temporada</h1>
    <p id="top-sub">Cargando...</p>
  </div>
</div>

<div class="body">

  <!-- SELECTOR CATEGORÍA -->
  <div class="cat-tabs" id="cat-tabs"></div>

  <!-- RESUMEN -->
  <div class="resumen-grid">
    <div class="resumen-box"><div class="resumen-val verde" id="r-aldia">—</div><div class="resumen-lbl">Al día</div></div>
    <div class="resumen-box"><div class="resumen-val rojo" id="r-pend">—</div><div class="resumen-lbl">Pendientes</div></div>
    <div class="resumen-box"><div class="resumen-val naranja" id="r-total">—</div><div class="resumen-lbl">Jugadores</div></div>
  </div>

  <!-- FILTROS -->
  <div class="filtros">
    <button class="filtro-btn on" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filtro-btn" onclick="setFiltro('pendiente',this)">⚠️ Pendientes</button>
    <button class="filtro-btn" onclick="setFiltro('al-dia',this)">✅ Al día</button>
  </div>

  <!-- WHATSAPP MASIVO -->
  <div class="sec-label">📢 Aviso masivo de pagos</div>
  <div style="background:#fff;border-radius:var(--radio-sm);border:.5px solid var(--borde);padding:12px;margin-bottom:12px">
    <p style="font-size:12px;color:var(--texto2);margin-bottom:10px">Genera avisos para todos los pendientes de pago. Se abrirá WhatsApp uno a uno.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <button class="filtro-btn" style="background:var(--azul);color:#fff;border-color:var(--azul)" onclick="masivo('club')">🌐 Todo el club</button>
      <button class="filtro-btn" style="background:var(--azul2);color:#fff;border-color:var(--azul2)" onclick="masivo('f11')">F11</button>
      <button class="filtro-btn" style="background:var(--verde);color:#fff;border-color:var(--verde)" onclick="masivo('f8')">F8</button>
    </div>
    <div id="masivo-resultado" style="margin-top:10px;font-size:12px;color:var(--texto3)"></div>
  </div>

  <!-- LISTA -->
  <div id="lista-jugadores"><div class="empty"><span class="spin"></span>Cargando...</div></div>

</div>

<script>
var PAGOS_URL = 'https://script.google.com/macros/s/AKfycbwarl68BTPnFPblQpfmQwpX7W694iixk2FFDrHxpAVJBpIBn6VwW_nSB8cOUv90xsSY/exec';

var CATEGORIAS = ['AMATEUR','JUVENIL','CADETE','INFANTIL','ALEVIN','BENJAMIN','PREBENJAMIN','QUERUBIN'];
var MESES      = ['INSCR.','SEPT.','OCT.','NOV.','DIC.','ENE.','FEB.','MARZO'];
var MESES_KEYS = ['inscr','sept','oct','nov','dic','ene','feb','marzo'];

var categoriaActual = 'AMATEUR';
var filtroActual    = 'todos';
var datosActuales   = [];

window.addEventListener('DOMContentLoaded', function() {
  // Tabs categorías
  var tabs = document.getElementById('cat-tabs');
  CATEGORIAS.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === categoriaActual ? ' on' : '');
    btn.textContent = cat;
    btn.onclick = function() {
      document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');
      categoriaActual = cat;
      cargar();
    };
    tabs.appendChild(btn);
  });
  cargar();
});

async function cargar() {
  document.getElementById('top-sub').textContent = categoriaActual;
  document.getElementById('lista-jugadores').innerHTML = '<div class="empty"><span class="spin"></span>Cargando...</div>';

  // Si no hay URL configurada
  if (!PAGOS_URL) {
    document.getElementById('lista-jugadores').innerHTML = '<div class="empty">⚙️ Sistema de pagos pendiente de configurar.<br><br>Contacta con el administrador.</div>';
    return;
  }

  try {
    var r = await fetch(PAGOS_URL + '?action=pagos&categoria=' + categoriaActual).then(function(r){return r.json();});
    if (!r.ok) { document.getElementById('lista-jugadores').innerHTML = '<div class="empty">⚠️ ' + (r.error||'Sin datos') + '</div>'; return; }
    datosActuales = r.jugadores || [];
    renderLista();
  } catch(e) {
    document.getElementById('lista-jugadores').innerHTML = '<div class="empty">⚠️ Sin conexión con el sistema de pagos</div>';
  }
}

function mostrarEjemplo() {
  // Datos de ejemplo para mostrar el diseño
  datosActuales = [
    {nombre:'García Pérez, Juan', telefono:'654321987', equipo:'AMATEUR', al_dia:true, meses_pendientes:[], pagos:{inscr:150,sept:50,oct:50,nov:50,dic:50,ene:50,feb:50,marzo:50}},
    {nombre:'Martínez López, Carlos', telefono:'687654321', equipo:'AMATEUR', al_dia:false, meses_pendientes:['ENE','FEB','MARZO'], pagos:{inscr:150,sept:50,oct:50,nov:50,dic:50,ene:'pendiente',feb:'pendiente',marzo:'pendiente'}},
    {nombre:'Sánchez Torres, David', telefono:'612345678', equipo:'AMATEUR', al_dia:false, meses_pendientes:['FEB','MARZO'], pagos:{inscr:150,sept:50,oct:50,nov:50,dic:50,ene:50,feb:'pendiente',marzo:'pendiente'}},
  ];
  renderLista();
}

function renderLista() {
  var aldia = datosActuales.filter(function(j){ return j.al_dia; }).length;
  var pend  = datosActuales.filter(function(j){ return !j.al_dia; }).length;
  document.getElementById('r-aldia').textContent = aldia;
  document.getElementById('r-pend').textContent  = pend;
  document.getElementById('r-total').textContent = datosActuales.length;

  var filtrados = datosActuales.filter(function(j) {
    if (filtroActual === 'al-dia')    return j.al_dia;
    if (filtroActual === 'pendiente') return !j.al_dia;
    return true;
  });

  if (!filtrados.length) {
    document.getElementById('lista-jugadores').innerHTML = '<div class="empty">Sin jugadores en este estado</div>';
    return;
  }

  // Ordenar: pendientes primero
  filtrados.sort(function(a,b){ return (a.al_dia?1:0)-(b.al_dia?1:0) || a.nombre.localeCompare(b.nombre); });

  var html = filtrados.map(function(j) {
    var estado = j.al_dia ? 'al-dia' : (j.meses_pendientes && j.meses_pendientes.length < 3 ? 'parcial' : 'pendiente');
    var iniciales = j.nombre.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
    var avColor   = estado==='al-dia'?'av-verde':estado==='parcial'?'av-naranja':'av-rojo';
    var badgeClass= estado==='al-dia'?'badge-al-dia':estado==='parcial'?'badge-parcial':'badge-pendiente';
    var badgeTxt  = estado==='al-dia'?'✅ Al día':estado==='parcial'?'⚠️ Parcial':'❌ Pendiente';

    var mesesHTML = MESES.map(function(mes, idx) {
      var key = MESES_KEYS[idx];
      var val = j.pagos ? j.pagos[key] : '';
      var cls = val === 'pendiente' || val === '' || val === null ? 'mes-pendiente' :
                typeof val === 'number' ? 'mes-pagado' : 'mes-especial';
      var lbl = mes.replace('.','');
      if (val === 'pendiente' || val === '' || val === null) lbl = '✗ ' + lbl;
      else if (typeof val === 'number') lbl = '✓ ' + lbl;
      else lbl = val.substring(0,6) + ' ' + lbl;
      return '<span class="mes-chip ' + cls + '">' + lbl + '</span>';
    }).join('');

    var tel = (j.telefono||'').toString().replace('.0','').replace(/[^0-9+]/g,'');
    var waMsg = encodeURIComponent('🔵 *Los Silos CF*\n\nHola, te recordamos que tienes pagos pendientes de la categoría ' + categoriaActual + '.\n\nMeses pendientes: ' + (j.meses_pendientes||[]).join(', ') + '\n\nGracias 🙏');
    var waTel = tel.startsWith('+') ? tel : '+34'+tel;

    return '<div class="jugador-card ' + estado + '">' +
      '<div class="jugador-header">' +
        '<div class="jugador-avatar ' + avColor + '">' + iniciales + '</div>' +
        '<div style="flex:1">' +
          '<div class="jugador-nombre">' + j.nombre + '</div>' +
          '<div class="jugador-equipo">' + (j.equipo||categoriaActual) + '</div>' +
        '</div>' +
        '<span class="badge-estado ' + badgeClass + '">' + badgeTxt + '</span>' +
      '</div>' +
      '<div class="meses-grid">' + mesesHTML + '</div>' +
      '<div class="jugador-footer">' +
        '<span class="jugador-tel">📞 ' + (tel||'Sin teléfono') + '</span>' +
        (tel && !j.al_dia ? '<button class="btn-wa" onclick="enviarWA(\'' + waTel + '\',\'' + waMsg + '\')">💬 WhatsApp</button>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('lista-jugadores').innerHTML = html;
}

var HORARIO_OFICINA = 'Lunes y Miércoles de 17:30 a 20:00 en Campo de las Oliveras y Martes y Jueves de 17:30 a 20:00 en Polideportivo de Burjassot.';
var INFO_PAGO = 'Puedes regularizarlo en oficinas o por transferencia bancaria. Te recordamos que el horario de oficina es: ' + HORARIO_OFICINA + ' Estamos a vuestra disposición para cualquier consulta.';

function generarMensaje(jugador) {
  var meses = jugador.meses_pendientes || [];
  var n = meses.length;
  if (n === 0) return '';

  var nombre = (jugador.nombre || '').split(',')[0].trim();
  var meses_txt = meses.join(' y ');

  if (n === 1) {
    return 'Hola, os recordamos que el pago de *' + meses_txt + '* está pendiente. ' + INFO_PAGO;
  } else if (n === 2) {
    return 'Hola, os recordamos que los pagos de *' + meses_txt + '* están pendientes. ' +
      'Os rogamos que regularicéis el pago antes del día 15, de lo contrario el jugador no podrá entrenar o jugar hasta regularizar dicho pago. ' + INFO_PAGO;
  } else {
    return 'Hola, llevamos *' + n + ' meses* con los pagos pendientes (' + meses_txt + '). ' +
      'Lamentamos comunicaros que hasta regularizar la situación el jugador *no podrá participar en entrenamientos ni partidos*. ' + INFO_PAGO;
  }
}

function enviarWA(tel, msg) {
  window.open('https://wa.me/' + tel.replace('+','').replace(/[^0-9]/g,'') + '?text=' + encodeURIComponent(msg), '_blank');
}

function enviarWAJugador(jugador) {
  var tel = (jugador.telefono||'').toString().replace('.0','').replace(/[^0-9+]/g,'');
  if (!tel) { alert('Sin teléfono registrado'); return; }
  if (!tel.startsWith('+')) tel = '+34' + tel;
  var msg = generarMensaje(jugador);
  if (!msg) { alert('Este jugador está al día'); return; }
  enviarWA(tel, msg);
}

function setFiltro(f, btn) {
  filtroActual = f;
  document.querySelectorAll('.filtro-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderLista();
}

var CATS_F11 = ['AMATEUR','JUVENIL','CADETE','INFANTIL'];
var CATS_F8  = ['ALEVIN','BENJAMIN','PREBENJAMIN','QUERUBIN'];

async function masivo(tipo) {
  var cats = tipo==='f11' ? CATS_F11 : tipo==='f8' ? CATS_F8 : CATS_F11.concat(CATS_F8);
  var pendientes = [];
  document.getElementById('masivo-resultado').textContent = 'Cargando datos...';
  for (var i = 0; i < cats.length; i++) {
    try {
      var r = await fetch(PAGOS_URL+'?action=pagos&categoria='+cats[i]).then(function(r){return r.json();});
      if (r.ok && r.jugadores) {
        r.jugadores.forEach(function(j){
          if (!j.al_dia && j.telefono && j.meses_pendientes && j.meses_pendientes.length>0) pendientes.push(j);
        });
      }
    } catch(e){}
  }
  if (!pendientes.length) { document.getElementById('masivo-resultado').textContent='✅ Sin pendientes de pago'; return; }
  document.getElementById('masivo-resultado').textContent = pendientes.length+' pendientes. Abriendo WhatsApp...';
  var enviados = 0;
  for (var j = 0; j < pendientes.length; j++) {
    var jug = pendientes[j];
    var tel = (jug.telefono||'').toString().replace('.0','').replace(/[^0-9+]/g,'');
    if (!tel) continue;
    if (!tel.startsWith('+')) tel = '+34'+tel;
    var msg = generarMensaje(jug);
    if (!msg) continue;
    await new Promise(function(res){setTimeout(res,800);});
    window.open('https://wa.me/'+tel.replace('+','')+' ?text='+encodeURIComponent(msg),'_blank');
    enviados++;
    document.getElementById('masivo-resultado').textContent = enviados+' de '+pendientes.length+' enviados...';
  }
  document.getElementById('masivo-resultado').textContent = '✅ '+enviados+' mensajes generados';
}

function mostrarError(msg) {
  document.getElementById('lista-jugadores').innerHTML = '<div class="empty">⚠️ '+(msg||'Error')+'</div>';
}
</script>
</body>
</html>
